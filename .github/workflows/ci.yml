name: CI

on:
  push:
    branches:
      - main
      # 5.2.x, 6.0.x, etc
      - /\d+\.\d+\.x/
      # 5.x, 6.x, etc
      - /\d+\.x/
  pull_request:
    branches:
      - main
      # 5.2.x, 6.0.x, etc
      - /\d+\.\d+\.x/
      # 5.x, 6.x, etc
      - /\d+\.x/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Persist package
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/releases
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint

  tests_local_browsers:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: package
          path: dist/releases
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1
      - name: Install dependencies
        run: npm install
      - name: Run local browser tests
        env:
          TEST_PLATFORM: local
          KARMA_PARALLEL_BROWSERS: 1
        run: npm run test

  tests_ssr:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: package
          path: dist/releases
      - name: Install dependencies
        run: npm install
      - name: Run SSR tests
        run: npm run test:ssr

  integration_tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: package
          path: dist/releases
      - name: Install dependencies
        run: npm install
      - name: Build universal demo app
        run: |
          npm run build
          npm run build:universal-demo-app

  publish_snapshots:
    environment: FLEX_LAYOUT_BUILDS_TOKEN
    runs-on: ubuntu-latest
    needs: [tests_local_browsers, integration_tests]
    # if: github.event_name == 'push' && github.event.pull_request == null
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: package
          path: dist/releases
      - name: Install dependencies
        run: npm install
      - name: Stamp
        run: npm run stamp
      - name: Publish snapshots
        env:
          FLEX_LAYOUT_BUILDS_TOKEN: ${{ secrets.FLEX_LAYOUT_BUILDS_TOKEN }}
        run: ./scripts/deploy/publish-build-artifacts.sh --no-build
